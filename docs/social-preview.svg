<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg-social" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="50%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0a0a12"/>
    </linearGradient>
    <!-- Accent gradient (purple/magenta) -->
    <linearGradient id="accent-social" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <!-- Glow filters -->
    <filter id="glow-purple-social">
      <feGaussianBlur stdDeviation="50" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-magenta-social">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="icon-glow-social">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Pill gradients -->
    <linearGradient id="spill-purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="spill-violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="spill-fuchsia" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d946ef" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#d946ef" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="spill-pink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="spill-indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.05"/>
    </linearGradient>
    <!-- Category pill gradient -->
    <linearGradient id="spill-slate" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#64748b" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#64748b" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg-social)"/>

  <!-- Grid lines -->
  <g stroke="#a855f7" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="64" x2="1280" y2="64"/>
    <line x1="0" y1="128" x2="1280" y2="128"/>
    <line x1="0" y1="192" x2="1280" y2="192"/>
    <line x1="0" y1="256" x2="1280" y2="256"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="384" x2="1280" y2="384"/>
    <line x1="0" y1="448" x2="1280" y2="448"/>
    <line x1="0" y1="512" x2="1280" y2="512"/>
    <line x1="0" y1="576" x2="1280" y2="576"/>
    <line x1="128" y1="0" x2="128" y2="640"/>
    <line x1="256" y1="0" x2="256" y2="640"/>
    <line x1="384" y1="0" x2="384" y2="640"/>
    <line x1="512" y1="0" x2="512" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="768" y1="0" x2="768" y2="640"/>
    <line x1="896" y1="0" x2="896" y2="640"/>
    <line x1="1024" y1="0" x2="1024" y2="640"/>
    <line x1="1152" y1="0" x2="1152" y2="640"/>
  </g>

  <!-- Glow orbs -->
  <circle cx="320" cy="280" r="200" fill="#a855f7" opacity="0.04"/>
  <circle cx="320" cy="280" r="120" fill="#a855f7" opacity="0.06"/>
  <circle cx="960" cy="320" r="180" fill="#c084fc" opacity="0.04"/>
  <circle cx="960" cy="320" r="100" fill="#c084fc" opacity="0.06"/>
  <!-- Extra subtle glow at center -->
  <circle cx="640" cy="300" r="150" fill="#9333ea" opacity="0.02"/>

  <!-- Top border accent -->
  <rect x="0" y="0" width="1280" height="3" fill="url(#accent-social)"/>
  <!-- Bottom border accent -->
  <rect x="0" y="637" width="1280" height="3" fill="url(#accent-social)"/>

  <!-- Floating binary columns (left side decoration) -->
  <g font-family="'SF Mono', Consolas, monospace" font-size="10" fill="#a855f7" opacity="0.06">
    <text x="30" y="100">01001000 01101001</text>
    <text x="25" y="120">10110100 01101100</text>
    <text x="35" y="140">01101001 00100000</text>
    <text x="20" y="160">11010010 10101010</text>
    <text x="30" y="480">00101101 11001010</text>
    <text x="25" y="500">01010110 10011011</text>
    <text x="35" y="520">10100011 01100100</text>
    <text x="20" y="540">11110001 00110110</text>
  </g>

  <!-- Floating binary columns (right side decoration) -->
  <g font-family="'SF Mono', Consolas, monospace" font-size="10" fill="#c084fc" opacity="0.06">
    <text x="1090" y="100">11001010 01010110</text>
    <text x="1095" y="120">00110110 10100011</text>
    <text x="1085" y="140">01100100 11110001</text>
    <text x="1100" y="160">10011011 00101101</text>
    <text x="1090" y="480">01001000 11010010</text>
    <text x="1095" y="500">10110100 01101001</text>
    <text x="1085" y="520">01101100 00100000</text>
    <text x="1100" y="540">10101010 11001100</text>
  </g>

  <!-- Eye icon with hidden binary elements (larger for social) -->
  <g transform="translate(640, 135)" filter="url(#icon-glow-social)">
    <!-- Outer eye shape -->
    <path d="M-50,0 C-50,0 -25,-34 0,-34 C25,-34 50,0 50,0 C50,0 25,34 0,34 C-25,34 -50,0 -50,0 Z"
          fill="none" stroke="url(#accent-social)" stroke-width="3" opacity="0.9"/>
    <!-- Iris -->
    <circle cx="0" cy="0" r="17" fill="none" stroke="#c084fc" stroke-width="2.5" opacity="0.8"/>
    <!-- Pupil -->
    <circle cx="0" cy="0" r="7.5" fill="#a855f7" opacity="0.7"/>
    <!-- Inner pupil highlight -->
    <circle cx="-2" cy="-2" r="2" fill="#e9d5ff" opacity="0.3"/>
    <!-- Binary digits scattered around iris (hidden data) -->
    <text x="-12" y="-4" font-family="'SF Mono', Consolas, monospace" font-size="7" fill="#c084fc" opacity="0.5">01</text>
    <text x="4" y="7" font-family="'SF Mono', Consolas, monospace" font-size="7" fill="#c084fc" opacity="0.4">10</text>
    <text x="-5" y="12" font-family="'SF Mono', Consolas, monospace" font-size="5.5" fill="#a855f7" opacity="0.35">11</text>
    <text x="7" y="-9" font-family="'SF Mono', Consolas, monospace" font-size="5.5" fill="#a855f7" opacity="0.35">00</text>
    <!-- Scan line through eye -->
    <line x1="-40" y1="0" x2="40" y2="0" stroke="#a855f7" stroke-width="0.8" opacity="0.25" stroke-dasharray="3,4"/>
    <!-- Pixel grid overlay on iris (steganography reference) -->
    <rect x="-5" y="-5" width="3.5" height="3.5" fill="#c084fc" opacity="0.12"/>
    <rect x="1.5" y="-5" width="3.5" height="3.5" fill="#a855f7" opacity="0.18"/>
    <rect x="-5" y="1.5" width="3.5" height="3.5" fill="#a855f7" opacity="0.18"/>
    <rect x="1.5" y="1.5" width="3.5" height="3.5" fill="#c084fc" opacity="0.12"/>
    <!-- Outer ring data bits -->
    <circle cx="0" cy="-22" r="1.5" fill="#c084fc" opacity="0.4"/>
    <circle cx="15" cy="-16" r="1.2" fill="#a855f7" opacity="0.35"/>
    <circle cx="21" cy="-4" r="1" fill="#c084fc" opacity="0.3"/>
    <circle cx="15" cy="16" r="1.2" fill="#a855f7" opacity="0.35"/>
    <circle cx="0" cy="22" r="1.5" fill="#c084fc" opacity="0.4"/>
    <circle cx="-15" cy="16" r="1.2" fill="#a855f7" opacity="0.35"/>
    <circle cx="-21" cy="-4" r="1" fill="#c084fc" opacity="0.3"/>
    <circle cx="-15" cy="-16" r="1.2" fill="#a855f7" opacity="0.35"/>
  </g>

  <!-- Title -->
  <text x="640" y="268" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="48" font-weight="700" fill="#ffffff" letter-spacing="-1">steganography-mcp</text>

  <!-- Subtitle -->
  <text x="640" y="310" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="20" fill="#a1a1aa" letter-spacing="0.8">128 Tools · 17 Categories · Zero API Keys Required</text>

  <!-- Accent line -->
  <rect x="500" y="332" width="280" height="3" rx="1.5" fill="url(#accent-social)" opacity="0.6"/>

  <!-- Stats pills row -->
  <g transform="translate(640, 385)">
    <!-- 128 Tools (purple) -->
    <g transform="translate(-340, 0)">
      <rect x="-50" y="-17" width="100" height="34" rx="17" fill="url(#spill-purple)" stroke="#a855f7" stroke-opacity="0.3" stroke-width="1"/>
      <text x="0" y="5" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="15" font-weight="600" fill="#a855f7">128 Tools</text>
    </g>
    <!-- 17 Categories (violet) -->
    <g transform="translate(-170, 0)">
      <rect x="-62" y="-17" width="124" height="34" rx="17" fill="url(#spill-violet)" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1"/>
      <text x="0" y="5" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="15" font-weight="600" fill="#8b5cf6">17 Categories</text>
    </g>
    <!-- MCP (fuchsia) -->
    <g transform="translate(0, 0)">
      <rect x="-38" y="-17" width="76" height="34" rx="17" fill="url(#spill-fuchsia)" stroke="#d946ef" stroke-opacity="0.3" stroke-width="1"/>
      <text x="0" y="5" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="15" font-weight="600" fill="#d946ef">MCP</text>
    </g>
    <!-- CLI (indigo) -->
    <g transform="translate(130, 0)">
      <rect x="-32" y="-17" width="64" height="34" rx="17" fill="url(#spill-indigo)" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
      <text x="0" y="5" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="15" font-weight="600" fill="#6366f1">CLI</text>
    </g>
    <!-- Zero Keys (pink) -->
    <g transform="translate(282, 0)">
      <rect x="-52" y="-17" width="104" height="34" rx="17" fill="url(#spill-pink)" stroke="#ec4899" stroke-opacity="0.3" stroke-width="1"/>
      <text x="0" y="5" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="15" font-weight="600" fill="#ec4899">Zero Keys</text>
    </g>
  </g>

  <!-- Category names - Row 1 -->
  <text x="640" y="455" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="13" fill="#52525b" letter-spacing="1">Image · JPEG · Audio · Text · File · Document · Crypto</text>

  <!-- Category names - Row 2 -->
  <text x="640" y="478" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="13" fill="#52525b" letter-spacing="1">Video · GIF · Network · MP3 · BPCS · Spread Spectrum</text>

  <!-- Category names - Row 3 -->
  <text x="640" y="501" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="13" fill="#52525b" letter-spacing="1">Archive · QR Code · Create · Advanced JPEG</text>

  <!-- Bottom tagline -->
  <text x="640" y="560" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#3f3f46" letter-spacing="3">MODEL CONTEXT PROTOCOL</text>

  <!-- Decorative corner dots -->
  <circle cx="30" cy="30" r="2.5" fill="#a855f7" opacity="0.3"/>
  <circle cx="1250" cy="30" r="2.5" fill="#c084fc" opacity="0.3"/>
  <circle cx="30" cy="610" r="2.5" fill="#c084fc" opacity="0.3"/>
  <circle cx="1250" cy="610" r="2.5" fill="#a855f7" opacity="0.3"/>

  <!-- Side accent lines -->
  <rect x="0" y="200" width="3" height="240" rx="1.5" fill="url(#accent-social)" opacity="0.15"/>
  <rect x="1277" y="200" width="3" height="240" rx="1.5" fill="url(#accent-social)" opacity="0.15"/>
</svg>