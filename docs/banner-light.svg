<svg xmlns="http://www.w3.org/2000/svg" width="830" height="200" viewBox="0 0 830 200">
  <defs>
    <!-- Light background gradient -->
    <linearGradient id="bg-light" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="50%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <!-- Accent gradient (purple/magenta) -->
    <linearGradient id="accent-light" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <!-- Glow filters (subtle for light theme) -->
    <filter id="glow-purple-light">
      <feGaussianBlur stdDeviation="25" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="icon-glow-light">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Pill gradients (light theme) -->
    <linearGradient id="lpill-purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="lpill-violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="lpill-fuchsia" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d946ef" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d946ef" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="lpill-pink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="lpill-indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="lpill-rose" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f43f5e" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f43f5e" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="lpill-lavender" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0.04"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="830" height="200" fill="url(#bg-light)"/>

  <!-- Grid lines (light) -->
  <g stroke="#a855f7" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="40" x2="830" y2="40"/>
    <line x1="0" y1="80" x2="830" y2="80"/>
    <line x1="0" y1="120" x2="830" y2="120"/>
    <line x1="0" y1="160" x2="830" y2="160"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="500" y1="0" x2="500" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="700" y1="0" x2="700" y2="200"/>
  </g>

  <!-- Glow orbs (very subtle on light bg) -->
  <circle cx="180" cy="90" r="100" fill="#a855f7" opacity="0.03"/>
  <circle cx="180" cy="90" r="55" fill="#a855f7" opacity="0.04"/>
  <circle cx="650" cy="100" r="90" fill="#c084fc" opacity="0.03"/>
  <circle cx="650" cy="100" r="50" fill="#c084fc" opacity="0.04"/>

  <!-- Top border accent -->
  <rect x="0" y="0" width="830" height="2" fill="url(#accent-light)"/>
  <!-- Bottom border accent -->
  <rect x="0" y="198" width="830" height="2" fill="url(#accent-light)"/>

  <!-- Eye icon with hidden binary elements -->
  <g transform="translate(85, 58)" filter="url(#icon-glow-light)">
    <!-- Outer eye shape -->
    <path d="M-30,0 C-30,0 -15,-20 0,-20 C15,-20 30,0 30,0 C30,0 15,20 0,20 C-15,20 -30,0 -30,0 Z"
          fill="none" stroke="#9333ea" stroke-width="2" opacity="0.8"/>
    <!-- Iris -->
    <circle cx="0" cy="0" r="10" fill="none" stroke="#a855f7" stroke-width="1.8" opacity="0.7"/>
    <!-- Pupil -->
    <circle cx="0" cy="0" r="4.5" fill="#9333ea" opacity="0.6"/>
    <!-- Binary digits scattered around iris -->
    <text x="-7" y="-2" font-family="'SF Mono', Consolas, monospace" font-size="4.5" fill="#9333ea" opacity="0.4">01</text>
    <text x="2" y="4" font-family="'SF Mono', Consolas, monospace" font-size="4.5" fill="#9333ea" opacity="0.35">10</text>
    <!-- Scan line through eye -->
    <line x1="-24" y1="0" x2="24" y2="0" stroke="#9333ea" stroke-width="0.5" opacity="0.25" stroke-dasharray="2,3"/>
    <!-- Pixel grid overlay on iris -->
    <rect x="-3" y="-3" width="2" height="2" fill="#a855f7" opacity="0.12"/>
    <rect x="1" y="-3" width="2" height="2" fill="#9333ea" opacity="0.15"/>
    <rect x="-3" y="1" width="2" height="2" fill="#9333ea" opacity="0.15"/>
    <rect x="1" y="1" width="2" height="2" fill="#a855f7" opacity="0.12"/>
  </g>

  <!-- Title -->
  <text x="415" y="55" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="26" font-weight="700" fill="#1e293b" letter-spacing="-0.5">steganography-mcp</text>

  <!-- Subtitle -->
  <text x="415" y="78" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" fill="#64748b" letter-spacing="0.5">128 Tools · 17 Categories · Zero API Keys</text>

  <!-- Accent line -->
  <rect x="340" y="88" width="150" height="2" rx="1" fill="url(#accent-light)" opacity="0.5"/>

  <!-- Category pills row -->
  <g transform="translate(415, 115)">
    <!-- Image (purple) -->
    <g transform="translate(-310, 0)">
      <rect x="-30" y="-11" width="60" height="22" rx="11" fill="url(#lpill-purple)" stroke="#a855f7" stroke-opacity="0.25" stroke-width="1"/>
      <text x="0" y="3" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="600" fill="#9333ea">Image</text>
    </g>
    <!-- JPEG (violet) -->
    <g transform="translate(-218, 0)">
      <rect x="-27" y="-11" width="54" height="22" rx="11" fill="url(#lpill-violet)" stroke="#8b5cf6" stroke-opacity="0.25" stroke-width="1"/>
      <text x="0" y="3" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="600" fill="#7c3aed">JPEG</text>
    </g>
    <!-- Audio (fuchsia) -->
    <g transform="translate(-132, 0)">
      <rect x="-29" y="-11" width="58" height="22" rx="11" fill="url(#lpill-fuchsia)" stroke="#d946ef" stroke-opacity="0.25" stroke-width="1"/>
      <text x="0" y="3" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="600" fill="#c026d3">Audio</text>
    </g>
    <!-- Text (pink) -->
    <g transform="translate(-48, 0)">
      <rect x="-26" y="-11" width="52" height="22" rx="11" fill="url(#lpill-pink)" stroke="#ec4899" stroke-opacity="0.25" stroke-width="1"/>
      <text x="0" y="3" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="600" fill="#db2777">Text</text>
    </g>
    <!-- File (indigo) -->
    <g transform="translate(34, 0)">
      <rect x="-24" y="-11" width="48" height="22" rx="11" fill="url(#lpill-indigo)" stroke="#6366f1" stroke-opacity="0.25" stroke-width="1"/>
      <text x="0" y="3" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="600" fill="#4f46e5">File</text>
    </g>
    <!-- Document (rose) -->
    <g transform="translate(128, 0)">
      <rect x="-36" y="-11" width="72" height="22" rx="11" fill="url(#lpill-rose)" stroke="#f43f5e" stroke-opacity="0.25" stroke-width="1"/>
      <text x="0" y="3" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="600" fill="#e11d48">Document</text>
    </g>
    <!-- Crypto (lavender) -->
    <g transform="translate(226, 0)">
      <rect x="-32" y="-11" width="64" height="22" rx="11" fill="url(#lpill-lavender)" stroke="#c084fc" stroke-opacity="0.25" stroke-width="1"/>
      <text x="0" y="3" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="600" fill="#9333ea">Crypto</text>
    </g>
  </g>

  <!-- Category names bottom text -->
  <text x="415" y="160" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="8.5" fill="#94a3b8" letter-spacing="0.8">LSB Embedding · DCT Manipulation · Spread Spectrum · Whitespace Encoding · EOF Injection · Watermarking · Steganalysis</text>

  <!-- Floating binary data decoration (left side) -->
  <g font-family="'SF Mono', Consolas, monospace" font-size="7" fill="#a855f7" opacity="0.06">
    <text x="18" y="50">01001000</text>
    <text x="12" y="65">10110100</text>
    <text x="22" y="80">01101001</text>
    <text x="8" y="145">11010010</text>
    <text x="15" y="160">00101101</text>
  </g>

  <!-- Floating binary data decoration (right side) -->
  <g font-family="'SF Mono', Consolas, monospace" font-size="7" fill="#c084fc" opacity="0.06">
    <text x="748" y="45">01100100</text>
    <text x="755" y="60">10011011</text>
    <text x="742" y="75">11001010</text>
    <text x="750" y="140">01010110</text>
    <text x="745" y="155">10100011</text>
  </g>

  <!-- Decorative corner dots -->
  <circle cx="15" cy="15" r="1.5" fill="#9333ea" opacity="0.25"/>
  <circle cx="815" cy="15" r="1.5" fill="#a855f7" opacity="0.25"/>
  <circle cx="15" cy="185" r="1.5" fill="#a855f7" opacity="0.25"/>
  <circle cx="815" cy="185" r="1.5" fill="#9333ea" opacity="0.25"/>

  <!-- Bottom tagline -->
  <text x="415" y="183" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="8" fill="#94a3b8" letter-spacing="2.5">MODEL CONTEXT PROTOCOL</text>
</svg>